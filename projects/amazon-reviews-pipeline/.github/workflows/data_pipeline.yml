name: Daily Pipeline

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM daily
  workflow_dispatch:      # Manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas google-cloud-bigquery dbt-bigquery openai python-dotenv sentence-transformers umap-learn hdbscan
      
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Run ingest
        run: python ingest.py
      
      - name: Run dbt
        run: cd review_pipeline && dbt run
      
      - name: Run classification (new negatives only)
        env:
         DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python 01_classify_reviews.py
    
      - name: Run clustering (daily, remember to consolidate)
        env:
         DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python 02_cluster_analysis.py