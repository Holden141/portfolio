name: Daily Pipeline

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pandas google-cloud-bigquery dbt-bigquery openai python-dotenv sentence-transformers umap-learn hdbscan
      
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Run ingest
        run: python projects/amazon-reviews-pipeline/ingest.py
      
      - name: Run dbt
        run: cd projects/amazon-reviews-pipeline/review_pipeline && dbt run --profiles-dir .
      
      - name: Run classification
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python projects/amazon-reviews-pipeline/01_classify_reviews.py
      
      - name: Run clustering
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python projects/amazon-reviews-pipeline/02_cluster_analysis.py